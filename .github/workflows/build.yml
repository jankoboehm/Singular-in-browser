name: Build Singular in Browser

on:
  pull_request:
  workflow_dispatch:
    inputs:
      singular_ref:
        description: Singular/Singular ref to build
        required: true
        default: spielwiese
      release_id:
        description: Release id used for packaging. Use test-* for signed release tests.
        required: false
        default: test-manual
      signed_release_test:
        description: "WARNING: signs artifacts with release secrets. Run only on trusted maintainer branches."
        required: true
        type: boolean
        default: false
      trusted_branch_confirmed:
        description: "Required for signed_release_test: I confirm the selected branch is trusted and may access signing secrets."
        required: true
        type: boolean
        default: false
      publish_test_manifest:
        description: "WARNING: for signed tests only, write manifest/signature to gh-pages under release_id. Use test-* ids."
        required: true
        type: boolean
        default: false
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    container: emscripten/emsdk:3.1.23
    env:
      SINGULAR_REF: ${{ inputs.singular_ref || 'spielwiese' }}
      RELEASE_ID: ${{ inputs.release_id || github.event.release.tag_name || github.sha }}
      SERVER_BASE_URL: https://www.singular.uni-kl.de/wasm/releases/${{ inputs.release_id || github.event.release.tag_name || github.sha }}/
      GITHUB_MANIFEST_URL: https://raw.githubusercontent.com/${{ github.repository }}/gh-pages/singular-wasm/${{ inputs.release_id || github.event.release.tag_name || github.sha }}/release-manifest.json
      IS_SIGNED_BUILD: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.signed_release_test) }}
      IS_SIGNED_RELEASE_TEST: ${{ github.event_name == 'workflow_dispatch' && inputs.signed_release_test }}
      TRUSTED_BRANCH_CONFIRMED: ${{ inputs.trusted_branch_confirmed }}
    steps:
      - name: Install build dependencies
        run: |
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            autoconf automake autoconf-archive libtool pkg-config git curl ca-certificates \
            python3 nodejs npm make g++ gcc m4 bison flex patch file xz-utils rsync zip

      - name: Check out browser repository
        uses: actions/checkout@v4
        with:
          path: browser
          persist-credentials: false

      - name: Check out Singular
        uses: actions/checkout@v4
        with:
          repository: Singular/Singular
          ref: ${{ env.SINGULAR_REF }}
          path: Singular
          persist-credentials: false

      - name: Overlay browser sources into Singular checkout
        run: |
          mkdir -p Singular/emscripten
          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='LICENSE' \
            --exclude='Singular/' \
            browser/ Singular/emscripten/

      - name: Fetch browser dependencies
        run: bash Singular/emscripten/web-workbench/scripts/fetch-web-deps.sh

      - name: Build Singular WebAssembly engine
        env:
          JOBS: 8
        run: |
          cd Singular
          bash emscripten/web-workbench/scripts/build-full-wasm.sh

      - name: Static smoke checks
        run: |
          cd Singular/emscripten/web-workbench
          bash scripts/smoke-static.sh

      - name: Validate signed release test request
        if: env.IS_SIGNED_RELEASE_TEST == 'true'
        run: |
          if [ "${TRUSTED_BRANCH_CONFIRMED}" != "true" ]; then
            echo "signed_release_test requires trusted_branch_confirmed=true." >&2
            exit 1
          fi
          case "${RELEASE_ID}" in
            test-*) ;;
            *)
              echo "Manual signed release tests must use a release_id beginning with test-." >&2
              exit 1
              ;;
          esac

      - name: Prepare signing keys
        if: env.IS_SIGNED_BUILD == 'true'
        env:
          PRIVATE_KEY: ${{ secrets.SINGULAR_WASM_RELEASE_PRIVATE_KEY_PEM }}
          PUBLIC_KEY: ${{ secrets.SINGULAR_WASM_RELEASE_PUBLIC_KEY_PEM }}
        run: |
          if [ -z "${PRIVATE_KEY}" ]; then
            echo "Missing SINGULAR_WASM_RELEASE_PRIVATE_KEY_PEM secret." >&2
            exit 1
          fi
          if [ -z "${PUBLIC_KEY}" ]; then
            echo "Missing SINGULAR_WASM_RELEASE_PUBLIC_KEY_PEM secret." >&2
            exit 1
          fi
          case "${PRIVATE_KEY}" in
            *"-----BEGIN PRIVATE KEY-----"*) ;;
            *)
              echo "SINGULAR_WASM_RELEASE_PRIVATE_KEY_PEM must be a PKCS#8 PEM private key." >&2
              exit 1
              ;;
          esac
          case "${PUBLIC_KEY}" in
            *"-----BEGIN PUBLIC KEY-----"*) ;;
            *)
              echo "SINGULAR_WASM_RELEASE_PUBLIC_KEY_PEM must be an SPKI PEM public key." >&2
              exit 1
              ;;
          esac
          mkdir -p "$HOME/.singular-wasm-release"
          printf '%s\n' "${PRIVATE_KEY}" > "$HOME/.singular-wasm-release/private.pem"
          printf '%s\n' "${PUBLIC_KEY}" > "$HOME/.singular-wasm-release/public.pem"

      - name: Package unsigned build artifact
        if: env.IS_SIGNED_BUILD != 'true'
        run: |
          cd Singular/emscripten/web-workbench
          bash scripts/package-served-files.sh

      - name: Package signed release artifact
        if: env.IS_SIGNED_BUILD == 'true'
        env:
          SIGNING_KEY: /github/home/.singular-wasm-release/private.pem
          TRUST_RELEASE_MANIFEST_URL: https://raw.githubusercontent.com/${{ github.repository }}/gh-pages/singular-wasm/${{ env.RELEASE_ID }}/release-manifest.json
          TRUST_RELEASE_SIGNATURE_URL: https://raw.githubusercontent.com/${{ github.repository }}/gh-pages/singular-wasm/${{ env.RELEASE_ID }}/release-manifest.json.sig
          TRUST_PUBLIC_KEY_FILE: /github/home/.singular-wasm-release/public.pem
        run: |
          cd Singular/emscripten/web-workbench
          bash scripts/package-served-files.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: singular-in-browser-${{ env.RELEASE_ID }}
          path: |
            Singular/emscripten/web-workbench/dist/${{ env.RELEASE_ID }}/singular-workbench-${{ env.RELEASE_ID }}.zip
            Singular/emscripten/web-workbench/dist/${{ env.RELEASE_ID }}/release-manifest.json
            Singular/emscripten/web-workbench/dist/${{ env.RELEASE_ID }}/release-manifest.json.sig
            Singular/emscripten/web-workbench/dist/${{ env.RELEASE_ID }}/release-manifest.json.sig.base64
          if-no-files-found: ignore

  attach-release:
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_ID: ${{ github.event.release.tag_name }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: singular-in-browser-${{ env.RELEASE_ID }}
          path: release-assets

      - name: Attach artifacts to GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const release = context.payload.release;
            const dir = path.join(process.cwd(), 'release-assets');
            for (const name of fs.readdirSync(dir)) {
              if (!name.endsWith('.zip') && !name.endsWith('.json') && !name.endsWith('.sig') && !name.endsWith('.base64')) continue;
              const filePath = path.join(dir, name);
              const data = fs.readFileSync(filePath);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id,
                name,
                data,
                headers: {
                  'content-type': 'application/octet-stream',
                  'content-length': data.length
                }
              });
            }

  publish-manifest:
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.signed_release_test && inputs.publish_test_manifest)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_ID: ${{ inputs.release_id || github.event.release.tag_name }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: singular-in-browser-${{ env.RELEASE_ID }}
          path: release-assets

      - name: Check out manifest branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: manifests

      - name: Publish signed manifest to gh-pages
        run: |
          test -f release-assets/release-manifest.json
          test -f release-assets/release-manifest.json.sig
          mkdir -p "manifests/singular-wasm/${RELEASE_ID}"
          cp release-assets/release-manifest.json \
            "manifests/singular-wasm/${RELEASE_ID}/release-manifest.json"
          cp release-assets/release-manifest.json.sig \
            "manifests/singular-wasm/${RELEASE_ID}/release-manifest.json.sig"
          cd manifests
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "singular-wasm/${RELEASE_ID}/release-manifest.json" \
            "singular-wasm/${RELEASE_ID}/release-manifest.json.sig"
          if git diff --cached --quiet; then
            echo "Signed manifest for ${RELEASE_ID} is already published."
          else
            git commit -m "publish Singular WASM manifest ${RELEASE_ID}"
            git push origin HEAD:gh-pages
          fi
