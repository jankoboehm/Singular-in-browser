server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  include /etc/nginx/mime.types;
  types { application/wasm wasm; }

  # Needed if you later enable pthreads/SharedArrayBuffer builds.
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Cross-Origin-Embedder-Policy "require-corp" always;
  add_header Cross-Origin-Resource-Policy "same-origin" always;
  add_header Referrer-Policy "no-referrer" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), usb=(), serial=(), bluetooth=()" always;

  # This CSP is compatible with classic Emscripten glue and local workers.
  # Tighten further once your build is known not to need 'unsafe-eval'.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' 'unsafe-eval'; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://raw.githubusercontent.com; object-src 'none'; base-uri 'none'; frame-ancestors 'none'" always;

  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* ^/engine/.*\.(js|wasm|data|json)$ {
    add_header Cache-Control "no-store" always;
    try_files $uri =404;
  }

  location ~* ^/vendor/.*\.(js|mjs|css|json)$ {
    add_header Cache-Control "no-store" always;
    try_files $uri =404;
  }

  location ~* \.(js|css|html|json|webmanifest)$ {
    add_header Cache-Control "public, max-age=300" always;
    try_files $uri =404;
  }
}
